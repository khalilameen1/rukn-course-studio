# Render Blueprint for Rukn Course Studio.
#
# Deploys two services from this monorepo:
#   - rukn-course-studio-backend  (FastAPI, backend/)
#   - rukn-course-studio-frontend (Next.js, frontend/)
#
# The backend keeps its SQLite database and storage/ files on a persistent
# disk (see docs/BUILD_PLAN.md - no managed DB/cloud storage introduced,
# per .cursor/rules/v1-architecture-constraints.mdc). Requires a paid plan
# (disks aren't available on Render's free tier).
#
# Secrets (ADMIN_USERNAME, ADMIN_PASSWORD, AUTH_SECRET_KEY, and
# ANTHROPIC_API_KEY if ever used) and deploy-time values
# (NEXT_PUBLIC_API_BASE_URL, CORS_ORIGINS) are intentionally left as
# `sync: false` - set them in the Render Dashboard after the first deploy,
# never commit them here. See README.md "Deploying to Render" for the full
# list and exact values.

services:
  - type: web
    name: rukn-course-studio-backend
    runtime: python
    plan: standard
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    disk:
      name: rukn-course-studio-data
      mountPath: /opt/render/project/src/backend/storage
      sizeGB: 10
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: ENVIRONMENT
        value: production
      # SQLite file + uploaded/extracted/generated files all live under the
      # persistent disk mounted above, so they survive redeploys/restarts -
      # everything else in the service filesystem is ephemeral. See
      # app/config.py `build_sqlite_url` / app/db.py for how this is used.
      - key: SQLITE_DB_PATH
        value: /opt/render/project/src/backend/storage/rukn_course_studio.db
      - key: STORAGE_UPLOADS_DIR
        value: /opt/render/project/src/backend/storage/uploads
      - key: STORAGE_EXTRACTED_DIR
        value: /opt/render/project/src/backend/storage/extracted
      - key: STORAGE_OUTPUTS_DIR
        value: /opt/render/project/src/backend/storage/outputs
      - key: STORAGE_TEMPLATES_DIR
        value: /opt/render/project/src/backend/storage/templates
      # FakeProvider by default for this pass - see app/ai/factory.py. Do
      # not switch to "anthropic" as part of this deploy; if that ever
      # changes, also set ANTHROPIC_API_KEY and AI_MODEL_NAME below.
      - key: AI_PROVIDER
        value: fake
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AI_MODEL_NAME
        sync: false
      # JSON array string, e.g. ["https://rukn-course-studio-frontend.onrender.com"]
      - key: CORS_ORIGINS
        sync: false
      # Single-admin-user auth (see app/auth/) - required for login to work
      # at all in production; set all three in the Dashboard, never here.
      - key: AUTH_ENABLED
        value: "true"
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: AUTH_SECRET_KEY
        sync: false

  - type: web
    name: rukn-course-studio-frontend
    runtime: node
    plan: starter
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      # Full URL incl. https://, NO trailing slash, e.g.
      # https://rukn-course-studio-backend.onrender.com - required at build
      # time (next.config.ts fails the build if unset); changing this value
      # requires a rebuild, not just a restart, since Next.js inlines it
      # into the client bundle.
      - key: NEXT_PUBLIC_API_BASE_URL
        sync: false
