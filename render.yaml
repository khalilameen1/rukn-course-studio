# Render Blueprint for Rukn Course Studio.
#
# Deploys two services from this monorepo:
#   - rukn-course-studio-backend  (FastAPI, backend/)
#   - rukn-course-studio-frontend (Next.js, frontend/)
#
# The backend's database is Postgres via DATABASE_URL (see
# app/config.py `_resolve_database_url`) - create a separate Postgres
# instance for this app in the Render Dashboard (New > PostgreSQL); do not
# reuse/share a database from another project. Uploaded sources and
# generated DOCX files are plain files, not DB rows, so they still live on
# a persistent disk regardless of where the database lives (see
# docs/BUILD_PLAN.md - no managed cloud storage introduced, per
# .cursor/rules/v1-architecture-constraints.mdc). Requires a paid plan on
# the backend (disks aren't available on Render's free tier).
#
# Secrets (ADMIN_USERNAME, ADMIN_PASSWORD, AUTH_SECRET_KEY, DATABASE_URL,
# and OPENAI_API_KEY) and deploy-time values
# (NEXT_PUBLIC_API_BASE_URL, FRONTEND_ORIGIN) are intentionally left as
# `sync: false` - set them in the Render Dashboard after the first deploy,
# never commit them here. See README.md "Deploying to Render" for the full
# list and exact values, including the SQLite-instead-of-Postgres fallback
# option.

services:
  - type: web
    name: rukn-course-studio-backend
    runtime: python
    plan: standard
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    disk:
      name: rukn-course-studio-data
      mountPath: /opt/render/project/src/backend/storage
      sizeGB: 10
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: ENVIRONMENT
        value: production
      # Postgres connection string for a dedicated database created for
      # this app (Render Dashboard > New > PostgreSQL > copy its "Internal
      # Database URL") - never a shared/reused database from another
      # project. Takes priority over SQLITE_DB_PATH; see app/config.py
      # `_resolve_database_url`. To use SQLite instead (temporary/legacy
      # option), leave this unset and set SQLITE_DB_PATH here instead - see
      # README.md "Deploying to Render".
      - key: DATABASE_URL
        sync: false
      # Uploaded/extracted/generated files live under the persistent disk
      # mounted above, independent of where the database lives, so they
      # survive redeploys/restarts - everything else in the service
      # filesystem is ephemeral. See app/config.py `storage_dir`.
      - key: STORAGE_DIR
        value: /opt/render/project/src/backend/storage
      # Production provider. The key and model remain Dashboard-managed
      # secrets/values; tests use FakeProvider and never spend AI credits.
      - key: AI_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: AI_MODEL_NAME
        value: gpt-5.6-sol
      # Long-running Pro+max architecture/final passes.
      - key: OPENAI_REQUEST_TIMEOUT_SECONDS
        value: "1800"
      # The deployed frontend's URL (no trailing slash) - allows it through
      # CORS. See app/config.py `frontend_origin`. Use CORS_ORIGINS instead
      # (JSON array string) if more than one origin is ever needed.
      - key: FRONTEND_ORIGIN
        sync: false
      # Single-admin-user auth (see app/auth/) - required for login to work
      # at all in production; set all three in the Dashboard, never here.
      - key: AUTH_ENABLED
        value: "true"
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: AUTH_SECRET_KEY
        sync: false

  - type: web
    name: rukn-course-studio-frontend
    runtime: node
    plan: starter
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      # Full URL incl. https://, NO trailing slash, e.g.
      # https://rukn-course-studio-backend.onrender.com - required at build
      # time (next.config.ts fails the build if unset); changing this value
      # requires a rebuild, not just a restart, since Next.js inlines it
      # into the client bundle.
      - key: NEXT_PUBLIC_API_BASE_URL
        sync: false
